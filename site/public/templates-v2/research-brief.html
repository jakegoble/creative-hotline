<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Research Brief · The Creative Hotline</title>
<link rel="stylesheet" href="tch-brand.css" />
<style>
  :root {
    --bg: var(--tch-cream, #F5F2EB);
    --ink: var(--tch-ink, #1C1C1E);
    --line: var(--tch-ink-line, rgba(28,28,30,0.18));
    --red: var(--tch-red, #EC3107);
    --blue: var(--tch-blue, #2B59C3);
    --muted: #6B6B6B;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--tch-mono, ui-monospace, "SFMono-Regular", Menlo, monospace);
    line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  header.top {
    background: var(--tch-ink, #1C1C1E); color: var(--tch-cream, #F5F2EB);
    padding: 14px 22px; border-bottom: 3px solid var(--red);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header.top .nav-logo { width: 78px; height: 34px; }
  header.top h1 {
    margin: 0; font-family: var(--tch-display, Georgia, serif);
    font-style: normal; font-weight: 400; font-size: clamp(18px, 4.5vw, 26px);
  }
  header.top h1 em { font-weight: 400; color: var(--tch-yellow, #F6ED52); font-style: italic; }
  header.top .back {
    margin-left: auto; font-family: var(--tch-nord, system-ui); font-weight: 700;
    letter-spacing: 0.12em; font-size: 11px; text-transform: uppercase;
    color: var(--tch-cream); text-decoration: none; border: 1.5px solid rgba(245,242,235,0.4);
    padding: 6px 12px;
  }
  header.top .back:hover { border-color: var(--tch-yellow); color: var(--tch-yellow); }
  main { max-width: 820px; margin: 0 auto; padding: 28px 20px 72px; }
  .meta {
    font-family: var(--tch-nord, system-ui); text-transform: uppercase;
    letter-spacing: 0.16em; font-size: 11px; color: var(--muted); margin-bottom: 8px;
  }
  .snapshot {
    font-family: var(--tch-display, Georgia, serif); font-style: normal; font-weight: 400;
    font-size: clamp(22px, 5vw, 34px); line-height: 1.12; margin: 0 0 28px;
  }
  .snapshot em { font-style: italic; color: var(--red); }
  .sec { margin-bottom: 28px; }
  .sec > .lab {
    font-family: var(--tch-nord, system-ui); font-weight: 700; letter-spacing: 0.16em;
    font-size: 11px; text-transform: uppercase; color: var(--red); margin-bottom: 10px;
  }
  .card {
    background: #fff; border: 1.5px solid var(--line); border-left: 5px solid var(--red);
    padding: 18px 20px; box-shadow: var(--tch-shadow-hard-sm, 0 4px 12px rgba(0,0,0,0.06));
  }
  .card.blue { border-left-color: var(--blue); }
  .card.ink { background: var(--tch-ink); color: var(--tch-cream); border-left-color: var(--tch-yellow); }
  ul.bul { list-style: none; margin: 0; padding: 0; }
  ul.bul li { position: relative; padding-left: 20px; margin-bottom: 9px; font-size: 14px; }
  ul.bul li:last-child { margin-bottom: 0; }
  ul.bul li::before { content: '→'; position: absolute; left: 0; color: var(--red); font-weight: 700; }
  .card.blue ul.bul li::before { color: var(--blue); }
  .statement { font-family: var(--tch-display, Georgia, serif); font-style: normal; font-weight: 400; font-size: clamp(18px, 3.5vw, 24px); line-height: 1.18; }
  .statement em { font-style: italic; color: var(--red); }
  .sub { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
  .pillars { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .pillar { background: #fff; border: 1.5px solid var(--line); padding: 14px 16px; }
  .pillar .pname { font-family: var(--tch-nord, system-ui); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; }
  .pillar .pscore { font-family: var(--tch-display, Georgia, serif); font-style: normal; font-weight: 400; font-size: 28px; color: var(--red); line-height: 1; margin: 4px 0 8px; }
  .pillar .pread { font-size: 13px; color: #333; }
  .two-col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .col-h { font-family: var(--tch-nord, system-ui); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; margin-bottom: 8px; }
  .col-h.m { color: var(--red); }
  .col-h.j { color: var(--blue); }
  .move { background: #fff; border: 1.5px solid var(--line); border-top: 5px solid var(--red); padding: 16px 18px; margin-bottom: 12px; }
  .move .mh { font-family: var(--tch-nord, system-ui); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; color: var(--red); margin-bottom: 6px; }
  .move .diy { font-family: var(--tch-display, Georgia, serif); font-style: normal; font-weight: 400; font-size: 18px; line-height: 1.2; margin-bottom: 8px; }
  .move .lvl { font-size: 13px; margin-bottom: 8px; }
  .move .lvl b { font-family: var(--tch-nord, system-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); }
  .move .why { font-size: 12px; color: var(--muted); font-style: italic; }
  .scorecard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .scorecell { background: #fff; border: 1.5px solid var(--line); padding: 12px 14px; }
  .scorecell .sname { font-family: var(--tch-nord, system-ui); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-size: 10px; }
  .scorecell .sscore { font-family: var(--tch-display, Georgia, serif); font-style: normal; font-weight: 400; font-size: 24px; color: var(--red); line-height: 1; margin: 4px 0 6px; }
  .scorecell .sscore.audit { font-size: 12px; font-family: var(--tch-nord, system-ui); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); }
  .scorecell .snote { font-size: 12px; color: #333; }
  .state { padding: 48px 8px; text-align: center; color: var(--muted); font-family: var(--tch-nord, system-ui); letter-spacing: 0.08em; text-transform: uppercase; font-size: 12px; }
  .foot { margin-top: 30px; font-size: 11px; color: var(--muted); font-family: var(--tch-nord, system-ui); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }
  @media (max-width: 620px) {
    .pillars, .two-col { grid-template-columns: 1fr; }
    .scorecard { grid-template-columns: repeat(2, 1fr); }
  }
  @media print {
    header.top { background: #fff; color: #000; border-bottom: 2px solid #000; }
    header.top .back { display: none; }
    .card, .pillar, .move { box-shadow: none; }
  }
</style>
</head>
<body>

<header class="top">
  <span class="nav-logo tch-logo-3stack-white"></span>
  <h1>Research <em>Brief</em></h1>
  <a class="back" id="backLink" href="#">↩ Back to Morning Prep</a>
</header>

<main>
  <div class="meta" id="metaLine">The Creative Hotline · pre-call read</div>
  <div id="content"><div class="state">Loading the research brief…</div></div>
  <div class="foot">Internal pre-call brief · The Creative Hotline</div>
</main>

<script>
(function () {
  "use strict";
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  var content = document.getElementById("content");
  var sid = "", iid = "";
  try {
    var p = new URL(window.location.href).searchParams;
    sid = p.get("sessionId") || "";
    iid = p.get("intakeId") || "";
  } catch (e) {}

  // Preserve sessionId on the back link.
  var back = document.getElementById("backLink");
  if (back && sid) back.href = "/templates-v2/morning-prep.html?sessionId=" + encodeURIComponent(sid);

  function arr(x) { return Array.isArray(x) ? x.filter(function (v) { return v != null && String(v).trim(); }) : []; }
  function bullets(items) {
    var a = arr(items);
    if (!a.length) return '<p class="sub">Not provided in this brief.</p>';
    return '<ul class="bul">' + a.map(function (t) { return "<li>" + esc(t) + "</li>"; }).join("") + "</ul>";
  }
  function emify(s) {
    // Render *word* / _word_ emphasis as <em>; otherwise plain escaped text.
    return esc(s).replace(/\*([^*]+)\*/g, "<em>$1</em>").replace(/_([^_]+)_/g, "<em>$1</em>");
  }

  function render(brief) {
    var u = brief.unlock || {};
    var ab = brief.authorityBaseline || {};
    var work = brief.whatsWorking || {};
    var push = brief.whatToPushOn || {};
    var moves = arr(brief.moves);
    var pillars = [
      ["Positioning", ab.positioning], ["Messaging", ab.messaging],
      ["Execution", ab.execution], ["Distribution", ab.distribution]
    ];
    var html = "";

    if (brief.clientSnapshot) html += '<p class="snapshot">' + emify(brief.clientSnapshot) + "</p>";

    if (brief.intakeReadback) {
      html += '<div class="sec"><div class="lab">What’s actually happening</div><div class="card"><p class="statement">' + emify(brief.intakeReadback) + "</p></div></div>";
    }

    // What we love + what we'd push on (two columns, brand vs systems)
    html += '<div class="sec"><div class="lab">What we love</div><div class="two-col">'
      + '<div><div class="col-h m">Megha · Brand</div><div class="card">' + bullets(work.brand && work.brand.length ? work.brand : brief.brandPositioning) + "</div></div>"
      + '<div><div class="col-h j">Jake · Systems</div><div class="card blue">' + bullets(work.systems && work.systems.length ? work.systems : brief.distributionSystems) + "</div></div>"
      + "</div></div>";

    html += '<div class="sec"><div class="lab">What we’d push on</div><div class="two-col">'
      + '<div><div class="col-h m">Megha · Brand</div><div class="card">' + bullets(push.brand) + "</div></div>"
      + '<div><div class="col-h j">Jake · Systems</div><div class="card blue">' + bullets(push.systems) + "</div></div>"
      + "</div></div>";

    // What we see (observation) + the gap (hypothesis) — kept distinct
    if (u.observation || u.hypothesis) {
      html += '<div class="sec"><div class="lab">What we see · and the gap beneath it</div>';
      if (u.observation) html += '<div class="card ink" style="margin-bottom:12px;"><div class="col-h" style="color:var(--tch-yellow)">What we see</div><p class="statement" style="color:var(--tch-cream)">' + emify(u.observation) + "</p></div>";
      if (u.hypothesis) html += '<div class="card"><div class="col-h m">The gap (hypothesis)</div><p class="statement">' + emify(u.hypothesis) + "</p></div>";
      if (u.testQuestion) html += '<p class="sub">↳ Test it by asking: “' + esc(u.testQuestion) + '”</p>';
      html += "</div>";
    }

    // Audience
    if (arr(brief.audience).length) {
      html += '<div class="sec"><div class="lab">Audience</div><div class="card">' + bullets(brief.audience) + "</div></div>";
    }

    // Authority baseline
    if (pillars.some(function (p) { return p[1] && (p[1].score || p[1].note); })) {
      html += '<div class="sec"><div class="lab">Creative Authority baseline</div><div class="pillars">'
        + pillars.map(function (p) {
            var v = p[1] || {};
            return '<div class="pillar"><div class="pname">' + esc(p[0]) + '</div><div class="pscore">' + (v.score ? esc(v.score) + " / 5" : "—") + '</div><div class="pread">' + esc(v.note || "") + "</div></div>";
          }).join("")
        + "</div></div>";
    }

    // The Play — three moves
    if (moves.length) {
      html += '<div class="sec"><div class="lab">The play · three moves</div>'
        + moves.map(function (m) {
            m = m || {};
            var out = '<div class="move"><div class="mh">' + esc(m.horizon || "Move") + "</div>";
            if (m.diy) out += '<div class="diy">' + emify(m.diy) + "</div>";
            if (m.levelUp) out += '<div class="lvl"><b>Level up:</b> ' + esc(m.levelUp) + "</div>";
            if (m.why) out += '<div class="why">Why: ' + esc(m.why) + "</div>";
            return out + "</div>";
          }).join("")
        + "</div>";
    }

    // Brand voice + visual identity (client-facing reads)
    if (brief.brandVoice) {
      html += '<div class="sec"><div class="lab">Brand voice</div><div class="card"><p class="statement">' + emify(brief.brandVoice) + "</p></div></div>";
    }
    if (brief.visualIdentity) {
      html += '<div class="sec"><div class="lab">Visual identity</div><div class="card blue"><p class="statement">' + emify(brief.visualIdentity) + "</p></div></div>";
    }

    // Content health scorecard (6 dimensions; null score = needs live audit)
    var ch = brief.contentHealth || {};
    var chCells = [
      ["Visual quality", ch.visualQuality], ["Brand cohesion", ch.brandCohesion],
      ["Copy & captions", ch.copyCaptions], ["Engagement", ch.engagement],
      ["Storytelling", ch.storytelling], ["Conversion path", ch.conversionPath]
    ].filter(function (c) { return c[1] && (c[1].score != null || (c[1].note && String(c[1].note).trim())); });
    if (chCells.length) {
      html += '<div class="sec"><div class="lab">Content health</div><div class="scorecard">'
        + chCells.map(function (c) {
            var v = c[1] || {};
            var scoreHtml = (v.score == null)
              ? '<div class="sscore audit">Needs live audit</div>'
              : '<div class="sscore">' + esc(v.score) + " / 5</div>";
            return '<div class="scorecell"><div class="sname">' + esc(c[0]) + "</div>" + scoreHtml + '<div class="snote">' + esc(v.note || "") + "</div></div>";
          }).join("")
        + "</div></div>";
    }

    // Competitive position
    if (arr(brief.competitivePosition).length) {
      html += '<div class="sec"><div class="lab">Competitive position</div><div class="card">' + bullets(brief.competitivePosition) + "</div></div>";
    }

    // The story you're telling (current vs should-be)
    var st = brief.storyTelling || {};
    if (st.current || st.shouldBe) {
      html += '<div class="sec"><div class="lab">The story you’re telling</div><div class="two-col">'
        + '<div><div class="col-h m">Right now</div><div class="card">' + (st.current ? '<p class="statement">' + emify(st.current) + "</p>" : '<p class="sub">Not provided in this brief.</p>') + "</div></div>"
        + '<div><div class="col-h j">Should be</div><div class="card blue">' + (st.shouldBe ? '<p class="statement">' + emify(st.shouldBe) + "</p>" : '<p class="sub">Not provided in this brief.</p>') + "</div></div>"
        + "</div></div>";
    }

    // Story hooks
    if (arr(brief.storyHooks).length) {
      html += '<div class="sec"><div class="lab">Story hooks</div><div class="card">' + bullets(brief.storyHooks) + "</div></div>";
    }

    // Virality levers
    if (arr(brief.viralityLevers).length) {
      html += '<div class="sec"><div class="lab">Virality levers</div><div class="card blue">' + bullets(brief.viralityLevers) + "</div></div>";
    }

    // The elephant — hard truth, named kindly
    if (brief.elephant) {
      html += '<div class="sec"><div class="lab">The elephant in the room</div><div class="card ink"><p class="statement" style="color:var(--tch-cream)">' + emify(brief.elephant) + "</p></div></div>";
    }

    // Reference brands
    if (arr(brief.referenceBrands).length) {
      html += '<div class="sec"><div class="lab">North-star brands</div><div class="card">' + bullets(brief.referenceBrands) + "</div></div>";
    }

    // Guardrails + open questions
    if (arr(brief.thingsToNotDo).length) {
      html += '<div class="sec"><div class="lab">Do not (guardrails)</div><div class="card">' + bullets(brief.thingsToNotDo) + "</div></div>";
    }
    if (arr(brief.openQuestions).length) {
      html += '<div class="sec"><div class="lab">Open questions to resolve live</div><div class="card blue">' + bullets(brief.openQuestions) + "</div></div>";
    }

    content.innerHTML = html || '<div class="state">This brief has no readable content.</div>';
  }

  function loadBrief(intakeId) {
    fetch("/api/research-brief/get?intakeId=" + encodeURIComponent(intakeId))
      .then(function (r) { return r.json().catch(function () { return {}; }); })
      .then(function (data) {
        if (!data || data.status !== "Ready" || !data.json) {
          var st = (data && data.status) || "Not Generated";
          content.innerHTML = '<div class="state">Research brief status: ' + esc(st) + '. It generates automatically once the client submits their intake.</div>';
          return;
        }
        var brief;
        try { brief = JSON.parse(data.json); } catch (e) { brief = null; }
        if (!brief) { content.innerHTML = '<div class="state">Brief could not be parsed.</div>'; return; }
        render(brief);
      })
      .catch(function () { content.innerHTML = '<div class="state">Couldn’t load the research brief.</div>'; });
  }

  if (iid) {
    loadBrief(iid);
  } else if (sid) {
    // Resolve the intake id from the session, then load the brief.
    fetch("/api/sessions/" + encodeURIComponent(sid))
      .then(function (r) { return r.json().catch(function () { return {}; }); })
      .then(function (s) {
        var intakeId = s && s.intake && s.intake.id;
        var name = (s && s.intake && (s.intake.businessName || s.intake.clientName)) || (s && s.payment && s.payment.customerName) || "";
        if (name) document.getElementById("metaLine").textContent = "The Creative Hotline · pre-call read · " + name;
        if (!intakeId) { content.innerHTML = '<div class="state">No intake linked to this session yet.</div>'; return; }
        loadBrief(intakeId);
      })
      .catch(function () { content.innerHTML = '<div class="state">Couldn’t load the session.</div>'; });
  } else {
    content.innerHTML = '<div class="state">No session or intake specified.</div>';
  }
})();
</script>
</body>
</html>
