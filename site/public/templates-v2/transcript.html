<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Your Call Transcript · The Creative Hotline</title>
<link rel="stylesheet" href="tch-brand.css" />
<style>
  :root {
    --bg: var(--tch-cream, #F5F2EB);
    --ink: var(--tch-ink, #1C1C1E);
    --line: var(--tch-ink-line, rgba(28,28,30,0.18));
    --red: var(--tch-red, #EC3107);
    --muted: #6B6B6B;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--tch-mono, ui-monospace, "SFMono-Regular", Menlo, monospace);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  header.top {
    background: var(--tch-ink, #1C1C1E); color: var(--tch-cream, #F5F2EB);
    padding: 14px 22px; border-bottom: 3px solid var(--red);
    display: flex; align-items: center; gap: 12px;
  }
  header.top .nav-logo { width: 78px; height: 34px; }
  header.top h1 {
    margin: 0; font-family: var(--tch-display, Georgia, serif);
    font-style: italic; font-weight: 400; font-size: clamp(18px, 4.5vw, 26px);
  }
  header.top h1 em { font-weight: 700; color: var(--tch-yellow, #F6ED52); font-style: normal; }
  main { max-width: 760px; margin: 0 auto; padding: 28px 20px 64px; }
  .meta {
    font-family: var(--tch-nord, system-ui); text-transform: uppercase;
    letter-spacing: 0.16em; font-size: 11px; color: var(--muted);
    margin-bottom: 18px;
  }
  .transcript-title {
    font-family: var(--tch-display, Georgia, serif); font-weight: 700;
    font-size: clamp(22px, 6vw, 34px); margin: 0 0 22px; line-height: 1.15;
  }
  .lines {
    background: #fff; border: 1.5px solid var(--line); border-left: 5px solid var(--red);
    padding: 22px 22px; font-size: 14px;
    box-shadow: var(--tch-shadow-hard-sm, 0 4px 12px rgba(0,0,0,0.06));
  }
  .line { margin: 0 0 12px; }
  .line:last-child { margin-bottom: 0; }
  .line .who {
    font-family: var(--tch-nord, system-ui); font-weight: 700;
    letter-spacing: 0.04em; color: var(--red); margin-right: 6px;
  }
  .state {
    padding: 40px 8px; text-align: center; color: var(--muted);
    font-family: var(--tch-nord, system-ui); letter-spacing: 0.08em;
    text-transform: uppercase; font-size: 12px;
  }
  .foot {
    margin-top: 28px; font-size: 11px; color: var(--muted);
    font-family: var(--tch-nord, system-ui); letter-spacing: 0.1em;
    text-transform: uppercase; text-align: center;
  }
  @media print {
    header.top { background: #fff; color: #000; border-bottom: 2px solid #000; }
    .lines { box-shadow: none; }
  }
</style>
</head>
<body>

<header class="top">
  <span class="nav-logo tch-logo-3stack-white"></span>
  <h1>Your Call <em>Transcript</em></h1>
</header>

<main>
  <div class="meta">The Creative Hotline</div>
  <h2 class="transcript-title" id="title">Session Transcript</h2>
  <div id="content"><div class="state">Loading your transcript…</div></div>
  <div class="foot">A record of your call · The Creative Hotline</div>
</main>

<script>
(function () {
  "use strict";
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  var content = document.getElementById("content");
  var sid = "";
  try { sid = new URL(window.location.href).searchParams.get("sessionId") || ""; } catch (e) {}

  if (!sid) {
    content.innerHTML = '<div class="state">No session specified.</div>';
    return;
  }

  fetch("/api/sessions/" + encodeURIComponent(sid) + "/transcript")
    .then(function (r) { return r.json().catch(function () { return { ok: false }; }); })
    .then(function (data) {
      if (!data || !data.ok) {
        var msg = (data && data.reason) || "Your transcript isn't available yet.";
        content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
        return;
      }
      if (data.title) {
        document.getElementById("title").textContent = data.title;
      }
      var lines = String(data.text || "").split("\n").filter(function (l) { return l.trim(); });
      if (!lines.length) {
        content.innerHTML = '<div class="state">Transcript is empty.</div>';
        return;
      }
      var html = lines.map(function (line) {
        var idx = line.indexOf(":");
        if (idx > 0 && idx < 40) {
          var who = line.slice(0, idx);
          var what = line.slice(idx + 1).trim();
          return '<p class="line"><span class="who">' + esc(who) + ":</span>" + esc(what) + "</p>";
        }
        return '<p class="line">' + esc(line) + "</p>";
      }).join("");
      content.innerHTML = '<div class="lines">' + html + "</div>";
    })
    .catch(function () {
      content.innerHTML = '<div class="state">Couldn’t load your transcript. Please try again later.</div>';
    });
})();
</script>
</body>
</html>
